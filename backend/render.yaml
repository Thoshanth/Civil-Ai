services:
  - type: web
    name: civilai-backend
    runtime: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    envVars:
      # Database Configuration (Neon.tech)
      - key: DB_HOST
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: neondb
      - key: DB_SSL_MODE
        value: require
      
      # File Storage Configuration (Cloudflare R2)
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        value: civilai-files
      
      # AI Service Configuration
      - key: AI_SERVICE_URL
        sync: false
      
      # JWT Configuration
      - key: JWT_SECRET
        sync: false
      
      # Email Configuration (Optional)
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      
      # Spring Profile
      - key: SPRING_PROFILES_ACTIVE
        value: prod
    
    healthCheckPath: /actuator/health
    
    autoDeploy: true
