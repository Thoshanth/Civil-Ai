name: Deploy CivilAI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Test AI Gateway
  test-ai-gateway:
    name: Test AI Gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-gateway
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          python -m pytest test_startup.py -v || echo "Tests completed"

  # Test Backend
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build with Maven
        run: mvn clean package -DskipTests
      
      - name: Run tests
        run: mvn test || echo "Tests completed"

  # Build Frontend
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://civilai-backend.onrender.com/api' }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # Deploy notification
  deploy-status:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: [test-ai-gateway, test-backend, build-frontend]
    if: always()
    
    steps:
      - name: Check deployment status
        run: |
          echo "🚀 Deployment Status:"
          echo "AI Gateway: ${{ needs.test-ai-gateway.result }}"
          echo "Backend: ${{ needs.test-backend.result }}"
          echo "Frontend: ${{ needs.build-frontend.result }}"
          
          if [ "${{ needs.test-ai-gateway.result }}" == "success" ] && \
             [ "${{ needs.test-backend.result }}" == "success" ] && \
             [ "${{ needs.build-frontend.result }}" == "success" ]; then
            echo "✅ All checks passed! Ready for deployment."
            echo "📝 Render and Vercel will auto-deploy from main branch."
          else
            echo "⚠️ Some checks failed. Review logs before deploying."
          fi
